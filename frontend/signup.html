<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand Azure — Create Account</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container" style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
  <div class="form-card glass">

    <div class="nav-brand" style="text-align:center; margin-bottom:30px; font-size:1.8rem;">
      Grand Azure <span>Hotel & Resort</span>
    </div>

    <h2>Create Account</h2>

    <div id="signup-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Smith" required />
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="john@email.com" required />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" required />
      </div>

      <button class="btn btn-gold" style="width:100%; margin-top:10px" onclick="registerUser()">
        Register Account
      </button>
      <p style="text-align:center; margin-top:20px; font-size:0.88rem;">
        Already have an account?
        <a href="login.html" style="color:var(--gold); font-weight:bold;">Sign In</a>
      </p>
    </div>

    <div id="verify-step" style="display:none; text-align:center;">
      <div class="alert alert-success"
        style="padding:15px; background:rgba(46,204,113,0.1); color:var(--success); border-radius:8px; margin-bottom:15px">
        ✅ Registration successful!
      </div>
      <p style="margin-bottom:20px; color:var(--text-muted)">
        You can now log in to reserve your suite.
      </p>
      <button class="btn btn-gold" onclick="window.location.href='login.html'">
        Go to Login
      </button>
    </div>

    <div id="reg-error" style="color:var(--danger); margin-top:15px; font-size:0.9rem"></div>

  </div>
</div>

<script>
  // ✅ MATCH backend
  const API = 'http://localhost:5000/api';

  async function registerUser() {
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    const errDiv = document.getElementById('reg-error');

    errDiv.textContent = "";

    if (!name || !email || !password) {
      errDiv.textContent = '⚠️ Please fill all fields.';
      return;
    }

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('verify-step').style.display = 'block';
      } else {
        errDiv.textContent = `❌ ${data.message}`;
      }

    } catch (err) {
      console.error(err);
      errDiv.textContent = '❌ Server is not running.';
    }
  }
</script>

</body>
</html>
