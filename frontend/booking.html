<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grand Azure Hotel — Book a Suite</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav class="glass" style="border:none; border-bottom:1px solid rgba(255,255,255,0.05);">
  <div class="nav-brand">Grand Azure <span>Hotel & Resort</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Suites</a></li>
    <li><a href="booking.html" class="active">Reserve</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Reserve Your Stay</h1>
  <p>Fill in your details and confirm your luxury accommodation</p>
</div>

<div class="container" style="max-width:800px;">
  <div class="form-card glass" style="max-width:100%; text-align:left; padding:50px;">
    <h2 style="text-align:center;">Booking Form</h2>

    <div class="form-group">
      <label for="roomSelect">Select Suite</label>
      <select id="roomSelect" onchange="onRoomChange()">
        <option value="">— Choose an accommodation —</option>
      </select>
    </div>

    <div id="room-info" style="display:none; background:rgba(0,0,0,0.3); border:1px solid var(--surface-border); border-radius:var(--radius-md); padding:20px; margin-bottom:24px; font-size:0.95rem;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="room-info-name" style="color:var(--text-main); font-weight:500;"></span>
        <strong style="color:var(--gold); font-size:1.2rem; font-family:'Playfair Display', serif;" id="room-info-price"></strong>
      </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
      <div class="form-group">
        <label for="fromDate">Check-in Date</label>
        <input type="date" id="fromDate" onchange="onDateChange()" />
      </div>
      <div class="form-group">
        <label for="toDate">Check-out Date</label>
        <input type="date" id="toDate" onchange="onDateChange()" />
      </div>
    </div>

    <div id="price-calc" style="display:none; background:rgba(212,175,55,0.05); border:1px solid rgba(212,175,55,0.2); border-radius:var(--radius-md); padding:20px; margin-bottom:24px;">
      <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted);">
        <span>Duration:</span><strong id="calc-nights" style="color:var(--text-main);"></strong>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--text-muted);">Estimated Total:</span><strong style="color:var(--gold); font-size:1.5rem; font-family:'Playfair Display', serif;" id="calc-total"></strong>
      </div>
    </div>

    <div class="form-group">
      <label for="userName">Full Name</label>
      <input type="text" id="userName" placeholder="e.g. John Smith" />
    </div>
    <div class="form-group">
      <label for="userEmail">Email Address</label>
      <input type="email" id="userEmail" placeholder="e.g. john@email.com" />
    </div>

    <button class="btn btn-gold" onclick="submitBooking()" id="book-btn" style="width:100%; margin-top:20px; padding:16px; font-size:1.05rem;">Confirm Reservation</button>
    <div id="booking-result" style="margin-top:20px; text-align:center;"></div>

    <div id="confirm-box" style="display:none; background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); border-radius:var(--radius-lg); padding:30px; margin-top:30px;">
      <h3 style="color:var(--success); margin-bottom:20px; text-align:center; font-family:'Inter', sans-serif;">🎉 Booking Confirmed!</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; font-size:0.95rem;">
        <div><span style="color:var(--text-muted); display:block; font-size:0.8rem; text-transform:uppercase;">Booking ID</span><strong style="color:var(--text-main);" id="c-id"></strong></div>
        <div><span style="color:var(--text-muted); display:block; font-size:0.8rem; text-transform:uppercase;">Suite</span><strong style="color:var(--text-main);" id="c-room"></strong></div>
        <div><span style="color:var(--text-muted); display:block; font-size:0.8rem; text-transform:uppercase;">Guest</span><strong style="color:var(--text-main);" id="c-name"></strong></div>
        <div><span style="color:var(--text-muted); display:block; font-size:0.8rem; text-transform:uppercase;">Email</span><strong style="color:var(--text-main);" id="c-email"></strong></div>
        <div><span style="color:var(--text-muted); display:block; font-size:0.8rem; text-transform:uppercase;">Check-in</span><strong style="color:var(--text-main);" id="c-from"></strong></div>
        <div><span style="color:var(--text-muted); display:block; font-size:0.8rem; text-transform:uppercase;">Check-out</span><strong style="color:var(--text-main);" id="c-to"></strong></div>
      </div>
      <div style="margin-top:20px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--text-muted); text-transform:uppercase; font-size:0.8rem; letter-spacing:1px;">Total Paid</span>
        <strong style="color:var(--gold); font-size:1.8rem; font-family:'Playfair Display', serif;" id="c-total"></strong>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:5000/api';
  let rooms = [];
  let selectedRoom = null;
  const urlParams = new URLSearchParams(window.location.search);
  const preSelectedRoomId = urlParams.get('roomId');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fromDate').min = today;
  document.getElementById('toDate').min = today;

  async function loadRooms() {
    try {
      const res = await fetch(`${API}/rooms`);
      const data = await res.json();
      rooms = data.data.filter(r => r.isAvailable);
      const select = document.getElementById('roomSelect');
      rooms.forEach(room => {
        const opt = document.createElement('option');
        opt.value = room.roomId;
        opt.textContent = `Suite ${room.roomNumber} — ${room.type} — $${room.price}/night`;
        if (String(room.roomId) === preSelectedRoomId) opt.selected = true;
        select.appendChild(opt);
      });
      if (preSelectedRoomId) onRoomChange();
      
      // Auto-fill logged in user
      if(localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('userName').value = localStorage.getItem('userName');
      }
    } catch (err) { console.error('Failed to load rooms:', err); }
  }

  function onRoomChange() {
    const id = document.getElementById('roomSelect').value;
    selectedRoom = rooms.find(r => String(r.roomId) === id) || null;
    const infoBox = document.getElementById('room-info');
    if (selectedRoom) {
      infoBox.style.display = 'block';
      document.getElementById('room-info-name').textContent = `Suite ${selectedRoom.roomNumber} — ${selectedRoom.type}`;
      document.getElementById('room-info-price').textContent = `$${selectedRoom.price}/night`;
    } else { infoBox.style.display = 'none'; }
    onDateChange();
  }

  function onDateChange() {
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    const calcBox = document.getElementById('price-calc');
    if (from && to && selectedRoom) {
      const nights = Math.ceil((new Date(to) - new Date(from)) / (1000 * 60 * 60 * 24));
      if (nights <= 0) { calcBox.style.display = 'none'; return; }
      document.getElementById('calc-nights').textContent = `${nights} night${nights > 1 ? 's' : ''}`;
      document.getElementById('calc-total').textContent = `$${nights * selectedRoom.price}`;
      calcBox.style.display = 'block';
    } else { calcBox.style.display = 'none'; }
  }

  async function submitBooking() {
    const roomId    = document.getElementById('roomSelect').value;
    const fromDate  = document.getElementById('fromDate').value;
    const toDate    = document.getElementById('toDate').value;
    const userName  = document.getElementById('userName').value.trim();
    const userEmail = document.getElementById('userEmail').value.trim();
    const resultDiv = document.getElementById('booking-result');
    const confirmBox = document.getElementById('confirm-box');

    if (!roomId || !fromDate || !toDate || !userName || !userEmail) {
      resultDiv.innerHTML = `<span style="color:var(--danger)">⚠️ Please fill in all fields.</span>`; return;
    }

    const btn = document.getElementById('book-btn');
    btn.disabled = true; btn.textContent = 'Processing...';
    resultDiv.innerHTML = ''; confirmBox.style.display = 'none';

    try {
      const res = await fetch(`${API}/bookings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roomId, fromDate, toDate, userName, userEmail }),
      });
      const data = await res.json();
      if (data.success) {
        const d = data.data;
        document.getElementById('c-id').textContent    = d.bookingId;
        document.getElementById('c-room').textContent  = `Suite ${d.roomNumber}`;
        document.getElementById('c-name').textContent  = d.userName;
        document.getElementById('c-email').textContent = d.userEmail;
        document.getElementById('c-from').textContent  = d.fromDate;
        document.getElementById('c-to').textContent    = d.toDate;
        document.getElementById('c-total').textContent  = `$${d.totalPrice}`;
        
        confirmBox.style.display = 'block';
        confirmBox.scrollIntoView({ behavior: 'smooth' });
        
        // Disable form to prevent double booking
        document.getElementById('roomSelect').disabled = true;
        document.getElementById('fromDate').disabled = true;
        document.getElementById('toDate').disabled = true;
        btn.style.display = 'none';
      } else {
        resultDiv.innerHTML = `<span style="color:var(--danger)">❌ ${data.message}</span>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `<span style="color:var(--danger)">❌ Failed to connect to server.</span>`;
    } finally {
      if(btn) { btn.disabled = false; btn.textContent = 'Confirm Reservation'; }
    }
  }

  loadRooms();
</script>
</body>
</html>
