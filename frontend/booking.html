<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grand Azure — Book a Suite</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<nav class="glass">
  <div class="nav-brand">Grand Azure <span>Hotel & Resort</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Rooms</a></li>
    <li><a href="booking.html" class="active">Reserve</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Reserve Your Stay</h1>
  <p>Fill your details and book your room</p>
</div>

<div class="container" style="max-width:800px;">
  <div class="form-card glass" style="max-width:100%; text-align:left; padding:50px;">
    
    <h2 style="text-align:center;">Booking Form</h2>

    <!-- ROOM TYPE -->
    <div class="form-group">
      <label>Room Type</label>
      <select id="roomType" onchange="filterRoomsByType()">
        <option value="">-- Select Type --</option>
        <option value="Single">Single</option>
        <option value="Double">Double</option>
        <option value="Deluxe">Deluxe</option>
        <option value="Suite">Suite</option>
      </select>
    </div>

    <!-- ROOM SELECT -->
    <div class="form-group">
      <label>Select Room</label>
      <select id="roomSelect" onchange="onRoomChange()">
        <option value="">— Choose Room —</option>
      </select>
    </div>

    <!-- ROOM INFO -->
    <div id="room-info" style="display:none; padding:15px; margin-bottom:20px;">
      <strong id="room-info-name"></strong>
      <span id="room-info-price"></span>
    </div>

    <!-- DATES -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <div class="form-group">
        <label>Check-in</label>
        <input type="date" id="fromDate" onchange="onDateChange()" />
      </div>
      <div class="form-group">
        <label>Check-out</label>
        <input type="date" id="toDate" onchange="onDateChange()" />
      </div>
    </div>

    <!-- PRICE -->
    <div id="price-calc" style="display:none; margin-top:20px;">
      <p id="calc-nights"></p>
      <h3 id="calc-total"></h3>
    </div>

    <!-- USER -->
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="userName" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="userEmail" />
    </div>

    <!-- BUTTON -->
    <button class="btn btn-gold" onclick="submitBooking()">Confirm Reservation</button>

    <div id="booking-result" style="margin-top:20px;"></div>

  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

let allRooms = [];
let selectedRoom = null;

const urlParams = new URLSearchParams(window.location.search);
const preSelectedRoomId = urlParams.get('roomId');

// 🔥 LOAD ROOMS
async function loadRooms() {
  const res = await fetch(`${API}/rooms`);
  const data = await res.json();

  allRooms = data.data.filter(r => r.isAvailable);

  // auto-fill user
  if(localStorage.getItem("isLoggedIn")) {
    document.getElementById("userName").value = localStorage.getItem("userName");
    document.getElementById("userEmail").value = localStorage.getItem("userEmail");
  }

  // 🔥 AUTO SELECT IF COMING FROM INDEX
  if (preSelectedRoomId) {
    const room = allRooms.find(r => r.roomId === preSelectedRoomId);
    if (room) {
      document.getElementById("roomType").value = room.type;
      filterRoomsByType();

      setTimeout(() => {
        document.getElementById("roomSelect").value = room.roomId;
        onRoomChange();
      }, 200);
    }
  }
}

// 🔥 FILTER BY TYPE
function filterRoomsByType() {
  const type = document.getElementById("roomType").value;
  const select = document.getElementById("roomSelect");

  select.innerHTML = `<option value="">— Choose Room —</option>`;

  if (!type) return;

  const filtered = allRooms.filter(r => r.type === type);

  filtered.forEach(room => {
    const opt = document.createElement("option");
    opt.value = room.roomId;
    opt.textContent = `Room ${room.roomNumber} - $${room.price}`;
    select.appendChild(opt);
  });
}

// 🔥 ROOM CHANGE
function onRoomChange() {
  const id = document.getElementById("roomSelect").value;
  selectedRoom = allRooms.find(r => r.roomId === id);

  if (selectedRoom) {
    document.getElementById("room-info").style.display = "block";
    document.getElementById("room-info-name").innerText =
      `Room ${selectedRoom.roomNumber} (${selectedRoom.type})`;
    document.getElementById("room-info-price").innerText =
      ` - $${selectedRoom.price}/night`;
  }

  onDateChange();
}

// 🔥 DATE CHANGE
function onDateChange() {
  const from = document.getElementById("fromDate").value;
  const to = document.getElementById("toDate").value;

  if (from && to && selectedRoom) {
    const nights = Math.ceil((new Date(to) - new Date(from)) / (1000*60*60*24));

    if (nights <= 0) return;

    document.getElementById("price-calc").style.display = "block";
    document.getElementById("calc-nights").innerText = `${nights} nights`;
    document.getElementById("calc-total").innerText =
      `$${nights * selectedRoom.price}`;
  }
}

// 🔥 SUBMIT
async function submitBooking() {
  const roomId = document.getElementById("roomSelect").value;
  const fromDate = document.getElementById("fromDate").value;
  const toDate = document.getElementById("toDate").value;
  const userName = document.getElementById("userName").value;
  const userEmail = document.getElementById("userEmail").value;

  if (!roomId || !fromDate || !toDate || !userName || !userEmail) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch(`${API}/bookings`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ roomId, fromDate, toDate, userName, userEmail })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("booking-result").innerHTML =
      "✅ Booking Confirmed!";
  } else {
    document.getElementById("booking-result").innerHTML =
      "❌ " + data.message;
  }
}

loadRooms();
</script>

</body>
</html>
