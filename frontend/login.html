<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grand Azure — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="container" style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
  <div class="form-card glass">
    
    <div class="nav-brand" style="text-align:center; margin-bottom:20px;">
      Grand Azure <span>Hotel & Resort</span>
    </div>

    <h2>Welcome Back</h2>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="chinnu@email.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="pass" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label>Login As</label>
      <select id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <button class="btn btn-gold" onclick="doLogin()">Sign In</button>

    <div id="login-error" style="margin-top:15px; text-align:center; font-size:0.85rem;"></div>

    <p style="text-align:center; margin-top:20px; font-size:0.88rem;">
      Don't have an account?
      <a href="signup.html" style="color:var(--gold); font-weight:bold;">Create Account</a>
    </p>

  </div>
</div>

<script>
  // ✅ Correct API base (matches your backend)
  const API = 'http://localhost:5000/api';

  async function doLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('pass').value;
    const role = document.getElementById('role').value;
    const errorDiv = document.getElementById('login-error');

    // clear previous error
    errorDiv.innerHTML = "";

    if (!email || !password) {
      errorDiv.innerHTML = "⚠️ Please fill all fields";
      return;
    }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role })
      });

      const data = await res.json();

      if (data.success) {
        // ✅ store user info
        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userName', data.user.name);
        localStorage.setItem('userEmail', data.user.email);
        localStorage.setItem('userRole', data.user.role);

        // ✅ redirect
        window.location.href = 'index.html';
      } else {
        errorDiv.innerHTML = `❌ ${data.message}`;
      }

    } catch (err) {
      console.error(err);
      errorDiv.innerHTML = `<span style="color:red;">❌ Server is not running</span>`;
    }
  }
</script>

</body>
</html>
